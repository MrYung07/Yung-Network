<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Yung Network - Social</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: linear-gradient(90deg, #6a0dad, #bb86fc);
      padding: 20px;
      text-align: center;
      font-size: 26px;
    }

    .container {
      margin-top: 40px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      background: #1a1a1a;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(106,13,173,0.6);
    }

    .profile img {
      width: 100px;
      height: 100px;
      border-radius: 15px;
      border: 3px solid #bb86fc;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .profile h2 {
      margin: 5px 0;
      color: #bb86fc;
    }

    .profile p {
      font-size: 14px;
      opacity: 0.8;
    }

    .socials {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .socials a {
      display: block;
      padding: 12px;
      background: #262626;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
      font-size: 16px;
    }

    .socials a:hover {
      background: #bb86fc;
      color: black;
      transform: scale(1.05);
    }

    footer {
      margin-top: 30px;
      padding: 10px;
      font-size: 12px;
      opacity: 0.6;
    }

      .discord-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #5865F2;
      border-radius: 810px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .discord-btn:hover {
      background: #4752c4;
    }

    footers {
      text-align: center;
      padding: 10px;
      background: #6a0dad;
    }
  </style>
</head>
