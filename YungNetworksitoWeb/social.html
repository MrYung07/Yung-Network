<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">

  <!-- IMPORTANTE PER MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Yung Network - Social</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: linear-gradient(90deg, #6a0dad, #bb86fc);
      padding: 18px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      margin-top: 25px;
      width: 95%;
      max-width: 450px;
      text-align: center;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(106,13,173,0.6);
    }

    .profile img {
      width: 90px;
      height: 90px;
      border-radius: 15px;
      border: 3px solid #bb86fc;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .profile h2 {
      margin: 5px 0;
      color: #bb86fc;
      font-size: 20px;
    }

    .profile p {
      font-size: 13px;
      opacity: 0.8;
    }

    .socials {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .socials a {
      display: block;
      padding: 14px;
      background: #262626;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
      font-size: 15px;
    }

    .socials a:hover {
      background: #bb86fc;
      color: black;
      transform: scale(1.03);
    }

    .discord-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 16px;
      background: #5865F2;
      border-radius: 50px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
      font-size: 14px;
    }

    .discord-btn:hover {
      background: #4752c4;
    }

    footer {
      margin-top: 25px;
      padding: 12px;
      font-size: 12px;
      opacity: 0.6;
      text-align: center;
    }

    /* EXTRA MOBILE */
    @media (max-width: 400px) {
      header {
        font-size: 18px;
      }

      .profile h2 {
        font-size: 18px;
      }

      .socials a {
        font-size: 14px;
        padding: 12px;
      }
    }
  </style>
</head>

<body>

<header>
  🔗 Yung Network
</header>

<div class="container">

  <div class="profile">
    <img src="logo mio.png">
    <h2>Yung Network</h2>
    <p>Creator • Gamer • Developer</p>
  </div>

  <div class="socials">
    <a href="https://www.tiktok.com/@mryung07?_r=1&_t=ZN-94hBYsdE2Ba">📸 TikTok</a>
    <a href="https://www.twitch.tv/mryung07">🎮 Twitch</a>
    <a href="https://www.youtube.com/@MrYung07">▶️ YouTube</a>
    <a href="https://discord.com/invite/xCPapWeUFY">💬 Discord</a>
  </div>

  <a class="discord-btn" href="index.html">
    ⬅️ Torna alla Home
  </a>

</div>

<footer>
  © 2026 - Yung Network
</footer>

</body>
</html>
